version: "3.9"

services:
  # -----------------------------------------------------------------------
  # API — Go + Gin application with Air hot reload (dev target)
  # -----------------------------------------------------------------------
  api:
    build:
      context: .
      target: dev
    volumes:
      - ./:/app # Mount entire project for live reload
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # Redis — in-memory cache and session store
  # -----------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
